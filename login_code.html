</div>

<p class="text-on-surface-variant text-sm mt-1">Input operational credentials to proceed.</p>
</div>
<form class="space-y-6">

<div class="group">

                        Operator ID
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">badge</span>
<input class="w-full bg-surface-container-low border border-outline-variant/20 rounded-lg py-3 pl-10 pr-4 text-sm text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed/20 transition-all font-mono" id="operator-id" placeholder="STATION_NODE_492" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="group">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2 font-bold group-focus-within:text-primary-fixed transition-colors" for="password">
                        Security Key
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock_open</span>
<input class="w-full bg-surface-container-low border border-outline-variant/20 rounded-lg py-3 pl-10 pr-4 text-sm text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed/20 transition-all font-mono" id="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-fixed hover:bg-primary-fixed-dim text-on-primary-fixed font-headline font-bold py-4 rounded-lg tracking-widest uppercase text-sm shadow-[0_0_20px_rgba(69,253,210,0.2)] active:scale-95 transition-all" type="submit">
                    Authenticate
                </button>
</form>
<!-- Footer Links -->
<div class="mt-8 flex items-center justify-between">
<a class="text-[10px] uppercase font-bold tracking-wider text-on-surface-variant hover:text-primary-fixed transition-colors" href="#">Emergency Bypass</a>
